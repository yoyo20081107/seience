<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高中物理段考復習系統 - 功與能量</title>

  <!-- 基礎庫載入 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- KaTeX 數學公式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');

    body {
      margin: 0;
      background: #0a0a0c;
      color: #e2e8f0;
      font-family: 'Noto+Sans+TC', sans-serif;
    }

    /* 確保 root 至少有最小高度 */
    #root {
      min-height: 100vh;
    }

    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .math-box {
      background: rgba(0, 0, 0, 0.3);
      padding: 1.5rem;
      border-radius: 0.75rem;
      margin: 1rem 0;
      text-align: center;
      color: #60a5fa;
      font-size: 1.25rem;
    }

    /* 簡單的掃描線特效，不影響內容 */
    .bg-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
      background-size: 100% 4px;
      z-index: 50;
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>
  
  <div id="root">
    <!-- 預載入提示，如果 JS 執行成功會被蓋掉 -->
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #3b82f6; font-family: sans-serif;">
      <div style="text-align: center;">
        <h2>物理復習系統載入中...</h2>
        <p style="color: #64748b;">如果長時間沒反應，請檢查網路連線或嘗試重新整理</p>
      </div>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 數學公式元件 (防錯版本)
    const Math = ({ tex }) => {
      const ref = useRef();
      useEffect(() => {
        if (ref.current && window.katex) {
          try {
            window.katex.render(tex, ref.current, { displayMode: true, throwOnError: false });
          } catch (e) {
            console.error(e);
            ref.current.textContent = tex;
          }
        }
      }, [tex]);
      return <div ref={ref} className="math-box" />;
    };

    const formulas = [
      { title: "功 (Work)", formula: "W = Fd \\cos\\theta", unit: "焦耳 (J)", desc: "力與位移的乘積。垂直不作功。", tip: "注意力與位移的夾角。" },
      { title: "動能 (Kinetic Energy)", formula: "K = \\frac{1}{2}mv^2", unit: "焦耳 (J)", desc: "運動中的能量。與速度平方成正比。", tip: "速度變2倍，動能變4倍。" },
      { title: "功能定理", formula: "W_{net} = \\Delta K", unit: "焦耳 (J)", desc: "合力作功等於動能變化。", tip: "解末速度的強力工具。" },
      { title: "重力位能", formula: "U = mgh", unit: "焦耳 (J)", desc: "高度帶來的能量。", tip: "高度差才是關鍵。" },
      { title: "力學能守恆", formula: "K + U = E_{total}", unit: "焦耳 (J)", desc: "無阻力時，能量總和不變。", tip: "自由落體與拋體必考。" }
    ];

    const quizData = [
      { q: "當推力方向與位移方向垂直時，作功為？", options: ["正功", "負功", "零", "無限大"], correct: 2, explain: "垂直不作功 (cos 90° = 0)。" },
      { q: "一物體質量 2kg，速度 4m/s，動能為？", options: ["4J", "8J", "16J", "32J"], correct: 2, explain: "K = 1/2 * 2 * 4^2 = 16J。" },
      { q: "自由落體過程中，什麼能量在轉換？", options: ["動能轉位能", "位能轉動能", "熱能轉位能", "不一定"], correct: 1, explain: "重力作正功，位能轉為動能。" }
    ];

    function App() {
      const [page, setPage] = useState('home');
      const [quizIdx, setQuizIdx] = useState(0);
      const [selected, setSelected] = useState(null);
      const [showAns, setShowAns] = useState(false);

      const NavButton = ({ id, label }) => (
        <button 
          onClick={() => setPage(id)}
          className={`px-4 py-2 rounded-lg transition-all text-sm font-bold ${page === id ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-white/10'}`}
        >
          {label}
        </button>
      );

      return (
        <div className="relative z-10 min-h-screen pb-20">
          {/* Header */}
          <nav className="glass sticky top-0 px-6 py-4 mb-8">
            <div className="max-w-5xl mx-auto flex justify-between items-center">
              <h1 className="text-xl font-black text-blue-500 tracking-tighter">PHYSICS REVIEW</h1>
              <div className="flex gap-1">
                <NavButton id="home" label="主頁" />
                <NavButton id="formula" label="公式" />
                <NavButton id="quiz" label="測驗" />
              </div>
            </div>
          </nav>

          <main className="max-w-4xl mx-auto px-6">
            {page === 'home' && (
              <div className="space-y-6">
                <div className="glass p-8 rounded-3xl border-l-4 border-blue-500">
                  <h2 className="text-4xl font-bold mb-4">功與能量</h2>
                  <p className="text-slate-300 text-lg">這是本次物理段考的最核心單元。掌握能量的轉換，比死背公式更重要。</p>
                </div>
                
                <div className="grid md:grid-cols-2 gap-4">
                  <div className="p-6 bg-blue-900/20 border border-blue-500/30 rounded-2xl">
                    <h3 className="text-blue-400 font-bold mb-2">重點 1：功的正負</h3>
                    <p className="text-sm text-slate-400 leading-relaxed">同向作正功，反向作負功，垂直不作功。這會影響物體的速度快慢。</p>
                  </div>
                  <div className="p-6 bg-amber-900/20 border border-amber-500/30 rounded-2xl">
                    <h3 className="text-amber-400 font-bold mb-2">重點 2：力學能守恆</h3>
                    <p className="text-sm text-slate-400 leading-relaxed">只要忽略空氣阻力和摩擦力，動能與位能的總和就會維持固定。</p>
                  </div>
                </div>

                <button onClick={() => setPage('formula')} className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-all">
                  查看完整公式表
                </button>
              </div>
            )}

            {page === 'formula' && (
              <div className="space-y-6">
                <h2 className="text-3xl font-bold text-center mb-8">必考公式整理</h2>
                {formulas.map((f, i) => (
                  <div key={i} className="glass p-6 rounded-2xl">
                    <div className="flex justify-between items-center mb-2">
                      <h3 className="text-xl font-bold text-blue-400">{f.title}</h3>
                      <span className="text-xs bg-white/10 px-2 py-1 rounded">{f.unit}</span>
                    </div>
                    <Math tex={f.formula} />
                    <p className="text-slate-400 text-sm">{f.desc}</p>
                    <div className="mt-3 text-xs text-amber-300">💡 老師叮嚀：{f.tip}</div>
                  </div>
                ))}
              </div>
            )}

            {page === 'quiz' && (
              <div className="glass p-8 rounded-3xl max-w-2xl mx-auto">
                <div className="mb-6 text-blue-500 text-sm font-bold">第 {quizIdx + 1} 題 / 共 {quizData.length} 題</div>
                <h3 className="text-2xl font-bold mb-8 leading-relaxed">{quizData[quizIdx].q}</h3>
                
                <div className="space-y-3">
                  {quizData[quizIdx].options.map((opt, i) => (
                    <button 
                      key={i}
                      onClick={() => { if(!showAns) { setSelected(i); setShowAns(true); } }}
                      className={`w-full text-left p-4 rounded-xl border transition-all ${
                        showAns 
                        ? i === quizData[quizIdx].correct 
                          ? 'bg-green-500/20 border-green-500 text-green-300' 
                          : selected === i ? 'bg-red-500/20 border-red-500 text-red-300' : 'bg-white/5 border-transparent opacity-40'
                        : 'bg-white/5 border-white/10 hover:border-blue-500 hover:bg-white/10'
                      }`}
                    >
                      {String.fromCharCode(65 + i)}. {opt}
                    </button>
                  ))}
                </div>

                {showAns && (
                  <div className="mt-8 p-6 bg-blue-500/10 border border-blue-500/30 rounded-xl">
                    <p className="font-bold text-blue-400 mb-2">正確答案：{String.fromCharCode(65 + quizData[quizIdx].correct)}</p>
                    <p className="text-slate-300 text-sm mb-6">{quizData[quizIdx].explain}</p>
                    <button 
                      onClick={() => { setQuizIdx((quizIdx + 1) % quizData.length); setShowAns(false); setSelected(null); }}
                      className="w-full py-3 bg-blue-600 rounded-lg font-bold"
                    >
                      下一題
                    </button>
                  </div>
                )}
              </div>
            )}
          </main>
          
          <footer className="mt-20 text-center text-slate-600 text-sm">
            © 2026 高中物理段考復習系統
          </footer>
        </div>
      );
    }

    // 確保 ReactDOM 載入完成才渲染
    const render = () => {
      const container = document.getElementById('root');
      if (container && window.ReactDOM) {
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
      }
    };
    
    // 稍微延遲以確保 CDN 腳本都就緒
    setTimeout(render, 100);
  </script>
</body>
</html>
